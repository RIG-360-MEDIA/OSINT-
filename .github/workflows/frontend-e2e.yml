name: frontend-e2e

# fix/brief-prod-readiness P3.17.
#
# The audit failed to run e2e/brief.spec.ts locally because chromium was
# not installed (`Executable doesn't exist at chromium_headless_shell`).
# This workflow runs on every PR and on pushes to main and ensures the
# Playwright browser binary is present before the test pass.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-e2e.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-e2e.yml'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Vitest unit tests
        run: npm test -- --run

      - name: TypeScript check (brief only — non-blocking on other dirs)
        run: npx tsc --noEmit | grep -E 'src/app/brief|src/app/.*[Bb]rief' || true

      - name: Playwright e2e — brief.spec.ts
        run: npx playwright test e2e/brief.spec.ts
        env:
          # Mocked spec — no real backend needed. The "live" version of
          # the spec only runs when E2E_BRIEF_LIVE=1 is set, which CI does
          # not set.
          CI: 'true'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
