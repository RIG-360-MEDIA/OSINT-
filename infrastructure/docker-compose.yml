version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# DEPLOYMENT TOPOLOGY — read before adding worker services here.
#
# Celery workers and Beat scheduler do NOT live as separate compose services.
# They run as 5 background processes inside the `rig-backend` container,
# launched by /start.sh on container boot. See infrastructure/Dockerfile.backend
# and the script's `celery -A backend.celery_app worker &` invocations.
#
# Queues and their consumers (one celery process each unless noted):
#   collectors    — RSS, HTML, social, newspapers       (concurrency=1)
#   youtube       — YouTube transcript + embedding      (concurrency=1)
#   nlp           — article NLP / topic / entities      (concurrency=4)
#   relevance     — per-user article + doc scoring      (concurrency=4)
#   brief         — daily briefing generation           (shared with relevance)
#   beat          — periodic-task scheduler             (1 process)
#
# KNOWN GAP: the `documents` queue (govt PDF collection — see celery_app.py
# routing) has no consumer. Beat publishes `tasks.collect_govt_documents` but
# no worker is subscribed → tasks rot in the queue. Adding the worker is a
# 5-line patch to start.sh, not a new compose service. See
# docs/qa/sources-why-broken.md.
#
# DO NOT add `rig-celery-worker-*` services here without first removing the
# in-container workers from start.sh. Two Beat schedulers will double-fire
# every periodic task — a real footgun.
# ─────────────────────────────────────────────────────────────────────────────

services:
  rig-postgres:
    image: ankane/pgvector:latest
    container_name: rig-postgres
    environment:
      POSTGRES_DB: rig
      POSTGRES_USER: rig
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    
    volumes:
      - rig-postgres-data:/var/lib/postgresql/data
      - ../scripts/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    networks:
      - rig-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rig -d rig"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  rig-freshrss:
    image: lscr.io/linuxserver/freshrss:latest
    container_name: rig-freshrss
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Asia/Kolkata
      CRON_MIN: "*/15"
    volumes:
      - rig-freshrss-data:/config
    ports:
      - "8081:80"
    networks:
      - rig-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  rig-searxng:
    image: searxng/searxng:latest
    container_name: rig-searxng
    environment:
      BASE_URL: "http://rig-searxng:8080/"
      INSTANCE_NAME: "RIG SearXNG"
    volumes:
      - ./searxng:/etc/searxng:rw
    networks:
      - rig-network
    restart: unless-stopped
    # Internal-only: no ports exposed to host. Reached via Docker DNS at
    # http://rig-searxng:8080 from rig-backend. Safe to leave running even
    # if DOSSIER_ENABLED=false — backend does not depend on it.

  rig-backend:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.backend
    container_name: rig-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://rig:${POSTGRES_PASSWORD}@rig-postgres:5432/rig
      DATABASE_URL_SYNC: postgresql://rig:${POSTGRES_PASSWORD}@rig-postgres:5432/rig
      GROQ_API_KEYS: ${GROQ_API_KEYS:-}
      YT_RELAY_URL: http://100.109.85.70:8888
      CEREBRAS_API_KEYS: ${CEREBRAS_API_KEYS:-}
      LOCAL_LLM_ENABLED: ${LOCAL_LLM_ENABLED:-1}     # 0 disables Trijya/Ollama slots in the LLM pool
      LOCAL_LLM_PRIMARY: ${LOCAL_LLM_PRIMARY:-0}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://172.30.0.1:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:32b}
      DOSSIER_ENABLED: ${DOSSIER_ENABLED:-false}
      SEARXNG_URL: ${SEARXNG_URL:-http://rig-searxng:8080}
      OPENSANCTIONS_API_KEY: ${OPENSANCTIONS_API_KEY:-}
      OPENCORPORATES_API_KEY: ${OPENCORPORATES_API_KEY:-}
      DOSSIER_PER_ADAPTER_TIMEOUT_S: ${DOSSIER_PER_ADAPTER_TIMEOUT_S:-12}
      DOSSIER_GDELT_TIMEOUT_S: ${DOSSIER_GDELT_TIMEOUT_S:-25}
      NEWSDATA_API_KEY: ${NEWSDATA_API_KEY:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      YOUTUBE_API_KEY_2: ${YOUTUBE_API_KEY_2:-}
      YOUTUBE_API_KEY_3: ${YOUTUBE_API_KEY_3:-}
      YOUTUBE_PROXY_URL: ${YOUTUBE_PROXY_URL:-}
      FRESHRSS_URL: ${FRESHRSS_URL:-http://rig-freshrss:80}
      FRESHRSS_USERNAME: ${FRESHRSS_USERNAME:-admin}
      FRESHRSS_PASSWORD: ${FRESHRSS_PASSWORD:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      # HS256 secret used to verify Supabase access tokens. Optional in dev,
      # REQUIRED in production. See infrastructure/.env.example.
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      # Super-admin bootstrap. Comma-separated list of emails promoted to
      # role='super_admin' on every backend boot. See
      # docs/RUNBOOK_SUPER_ADMIN_BOOTSTRAP.md.
      SUPER_ADMIN_EMAILS: ${SUPER_ADMIN_EMAILS:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      # Govt-doc collection window (days). Bumped from 2 to 30 because budget
      # / policy / annual-report sources don't publish daily.
      GOVT_DEFAULT_SINCE_DAYS: ${GOVT_DEFAULT_SINCE_DAYS:-30}
      # Per-portal harvest cap. Bumped 15 -> 100 so adapters can pick up
      # 30 days of backlog instead of just the front-page 15 items.
      GOVT_PER_PORTAL_CAP: ${GOVT_PER_PORTAL_CAP:-100}
      NLP_BATCH_SIZE: ${NLP_BATCH_SIZE:-25}
      BRIEF_ARTICLE_LIMIT: ${BRIEF_ARTICLE_LIMIT:-30}
      TWITTER_BEARER_TOKEN: ${TWITTER_BEARER_TOKEN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      TELEGRAM_SESSION_STRING: ${TELEGRAM_SESSION_STRING:-}
      # Used by /api/worldmonitor/telangana/* — ACLED for Telangana events.
      ACLED_ACCESS_TOKEN: ${ACLED_ACCESS_TOKEN:-}
      WM_TG_CACHE_TTL_S: ${WM_TG_CACHE_TTL_S:-1800}
    volumes:
      - ../backend:/app/backend
      - ../scripts:/app/scripts
      # Persist Celery Beat's last-run-times DB across container restarts.
      # Without this, every `docker compose up` resets the schedule to
      # "now" and crontab/timedelta entries silently drift forward.
      - rig-beat-schedule:/app/beat
    ports:
      - "8000:8000"
    networks:
      - rig-network
    depends_on:
      rig-postgres:
        condition: service_healthy
      rig-freshrss:
        condition: service_healthy
    restart: unless-stopped

  osint-backend:
    build:
      context: ../products/osint/backend
      dockerfile: Dockerfile
    container_name: osint-backend
    environment:
      - OSINT_DB_URL=postgresql+asyncpg://analytics_user:${ANALYTICS_DB_PASSWORD}@rig-postgres:5432/rig?ssl=disable
      - OSINT_CORS_ORIGINS=http://localhost:3000,http://localhost:3001,http://178.105.63.154:3001,https://brief.rig360media.com,http://localhost:5180
      - OSINT_DB_POOL_SIZE=5
      - OSINT_DB_MAX_OVERFLOW=10
      - OSINT_HOST=0.0.0.0
      - OSINT_PORT=8000
      - OSINT_LOG_LEVEL=INFO
      # Supabase JWT verification + admin API calls (same env rig-backend uses).
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - OSINT_ENVIRONMENT=production
      # Where the brief-next frontend lives (used to build invite links).
      - OSINT_FRONTEND_BASE=https://brief.rig360media.com
      # First super-admin email — only this account can call /api/admin/bootstrap.
      # Must match an existing Supabase auth user; maverick092005@gmail.com is
      # the rig-backend super_admin (verified 2026-05-29 via admin/users API).
      - OSINT_BOOTSTRAP_ADMIN_EMAIL=maverick092005@gmail.com
      - GROQ_API_KEYS=${GROQ_API_KEYS}
      - CEREBRAS_API_KEYS=${CEREBRAS_API_KEYS}
      - ACLED_ACCESS_TOKEN=${ACLED_ACCESS_TOKEN}
      - LOCAL_LLM_ENABLED=0
      - GMAIL_ADDRESS=alternate00acc04@gmail.com
      - GMAIL_APP_PASSWORD=ctyqxsremdsfmlne
    ports:
      - "8002:8000"
    networks:
      - rig-network
    depends_on:
      - rig-postgres
    restart: unless-stopped

networks:
  rig-network:
    driver: bridge
    # IPv6 enabled (Docker Desktop's "Enable IPv6" toggle is on); harmless
    # for everything else. Originally added in a (failed) attempt to reach
    # 7 govt domains (finmin.nic.in, tserc.gov.in, tspsc.gov.in,
    # loksabhadocs.nic.in, eparlib.nic.in, plus Sansad mirrors). Investigation
    # showed those domains return ANCOUNT=0 from any public resolver — they
    # are genuinely NXDOMAIN, not IPv6-only. The fix is URL re-research,
    # not network surgery.
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.30.0.0/24
        - subnet: fd00:dead:beef::/64

volumes:
  rig-postgres-data:
    name: rig-postgres-data
  rig-freshrss-data:
    name: rig-freshrss-data
  rig-wm-redis-data:
    name: rig-wm-redis-data
  rig-beat-schedule:
    name: rig-beat-schedule
