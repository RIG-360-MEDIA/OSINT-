# Entity seed — International / multilateral / supranational
country: XX                # 'XX' = not bound to a single country
version: v1
notes: |
  UN system, regional blocs, multilateral finance, alliances, courts,
  NGOs, religious bodies. These show up in 100s of articles per day
  but have no country, so we tag them XX.
  Last updated: 2026-05-28.

