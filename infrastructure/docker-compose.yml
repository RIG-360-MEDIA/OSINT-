version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# DEPLOYMENT TOPOLOGY — read before adding worker services here.
#
# Celery workers and Beat scheduler do NOT live as separate compose services.
# They run as 5 background processes inside the `rig-backend` container,
# launched by /start.sh on container boot. See infrastructure/Dockerfile.backend
# and the script's `celery -A backend.celery_app worker &` invocations.
#
# Queues and their consumers (one celery process each unless noted):
#   collectors    — RSS, HTML, social, newspapers       (concurrency=1)
#   youtube       — YouTube transcript + embedding      (concurrency=1)
#   nlp           — article NLP / topic / entities      (concurrency=4)
#   relevance     — per-user article + doc scoring      (concurrency=4)
#   brief         — daily briefing generation           (shared with relevance)
#   beat          — periodic-task scheduler             (1 process)
#
# KNOWN GAP: the `documents` queue (govt PDF collection — see celery_app.py
# routing) has no consumer. Beat publishes `tasks.collect_govt_documents` but
# no worker is subscribed → tasks rot in the queue. Adding the worker is a
# 5-line patch to start.sh, not a new compose service. See
# docs/qa/sources-why-broken.md.
#
# DO NOT add `rig-celery-worker-*` services here without first removing the
# in-container workers from start.sh. Two Beat schedulers will double-fire
# every periodic task — a real footgun.
# ─────────────────────────────────────────────────────────────────────────────

services:
  rig-postgres:
    image: ankane/pgvector:latest
    container_name: rig-postgres
    environment:
      POSTGRES_DB: rig
      POSTGRES_USER: rig
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - rig-postgres-data:/var/lib/postgresql/data
      - ../scripts/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    networks:
      - rig-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rig -d rig"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  rig-freshrss:
    image: lscr.io/linuxserver/freshrss:latest
    container_name: rig-freshrss
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Asia/Kolkata
      CRON_MIN: "*/15"
    volumes:
      - rig-freshrss-data:/config
    ports:
      - "8081:80"
    networks:
      - rig-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  rig-searxng:
    image: searxng/searxng:latest
    container_name: rig-searxng
    environment:
      BASE_URL: "http://rig-searxng:8080/"
      INSTANCE_NAME: "RIG SearXNG"
    volumes:
      - ./searxng:/etc/searxng:rw
    networks:
      - rig-network
    restart: unless-stopped
    # Internal-only: no ports exposed to host. Reached via Docker DNS at
    # http://rig-searxng:8080 from rig-backend. Safe to leave running even
    # if DOSSIER_ENABLED=false — backend does not depend on it.

  rig-backend:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.backend
    container_name: rig-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://rig:${POSTGRES_PASSWORD}@rig-postgres:5432/rig
      DATABASE_URL_SYNC: postgresql://rig:${POSTGRES_PASSWORD}@rig-postgres:5432/rig
      GROQ_API_KEYS: ${GROQ_API_KEYS:-}
      DOSSIER_ENABLED: ${DOSSIER_ENABLED:-false}
      SEARXNG_URL: ${SEARXNG_URL:-http://rig-searxng:8080}
      OPENSANCTIONS_API_KEY: ${OPENSANCTIONS_API_KEY:-}
      OPENCORPORATES_API_KEY: ${OPENCORPORATES_API_KEY:-}
      DOSSIER_PER_ADAPTER_TIMEOUT_S: ${DOSSIER_PER_ADAPTER_TIMEOUT_S:-12}
      DOSSIER_GDELT_TIMEOUT_S: ${DOSSIER_GDELT_TIMEOUT_S:-25}
      NEWSDATA_API_KEY: ${NEWSDATA_API_KEY:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      YOUTUBE_API_KEY_2: ${YOUTUBE_API_KEY_2:-}
      YOUTUBE_API_KEY_3: ${YOUTUBE_API_KEY_3:-}
      YOUTUBE_PROXY_URL: ${YOUTUBE_PROXY_URL:-}
      FRESHRSS_URL: ${FRESHRSS_URL:-http://rig-freshrss:80}
      FRESHRSS_USERNAME: ${FRESHRSS_USERNAME:-admin}
      FRESHRSS_PASSWORD: ${FRESHRSS_PASSWORD:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      # Govt-doc collection window (days). Bumped from 2 to 30 because budget
      # / policy / annual-report sources don't publish daily.
      GOVT_DEFAULT_SINCE_DAYS: ${GOVT_DEFAULT_SINCE_DAYS:-30}
      # Per-portal harvest cap. Bumped 15 -> 100 so adapters can pick up
      # 30 days of backlog instead of just the front-page 15 items.
      GOVT_PER_PORTAL_CAP: ${GOVT_PER_PORTAL_CAP:-100}
      NLP_BATCH_SIZE: ${NLP_BATCH_SIZE:-25}
      BRIEF_ARTICLE_LIMIT: ${BRIEF_ARTICLE_LIMIT:-30}
      TWITTER_BEARER_TOKEN: ${TWITTER_BEARER_TOKEN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      TELEGRAM_SESSION_STRING: ${TELEGRAM_SESSION_STRING:-}
    volumes:
      - ../backend:/app/backend
      - ../scripts:/app/scripts
    ports:
      - "8000:8000"
    networks:
      - rig-network
    depends_on:
      rig-postgres:
        condition: service_healthy
      rig-freshrss:
        condition: service_healthy
    restart: unless-stopped

  rig-frontend:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.frontend
    container_name: rig-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://127.0.0.1:8000}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      NEXT_PUBLIC_DOSSIER_ENABLED: ${NEXT_PUBLIC_DOSSIER_ENABLED:-false}
      # Reverse-proxy target for /world-monitor-app/* (see next.config.ts).
      # Inside the rig-network, WM is reachable as http://rig-worldmonitor:8080.
      WM_INTERNAL_URL: ${WM_INTERNAL_URL:-http://rig-worldmonitor:8080}
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/public:/app/public
      - ../frontend/package.json:/app/package.json
      # Mounted so editing the rewrite/iframe target hot-reloads in dev.
      # Without this, next.config.ts changes require `docker compose build rig-frontend`.
      - ../frontend/next.config.ts:/app/next.config.ts
    ports:
      - "3000:3000"
    networks:
      - rig-network
    depends_on:
      - rig-backend
    restart: unless-stopped

  # ───────────────────────────────────────────────────────────────────────────
  # World Monitor pillar (iframe-embedded). Display-only; no data flows into
  # rig's Postgres. See plan: ~/.claude/plans/i-have-two-projects-misty-wren.md
  # ───────────────────────────────────────────────────────────────────────────
  rig-worldmonitor:
    build:
      context: ../world-monitor
      dockerfile: Dockerfile
    image: rig-worldmonitor:latest
    container_name: rig-worldmonitor
    environment:
      # Inter-service URLs — rewritten from WM's stock compose to use renamed
      # service hostnames on rig-network. Do NOT change these to the original
      # short names; rig-network has no `redis-rest` / `ais-relay` aliases.
      UPSTASH_REDIS_REST_URL: "http://rig-wm-redis-rest:80"
      UPSTASH_REDIS_REST_TOKEN: "${WM_REDIS_TOKEN:-wm-local-token}"
      LOCAL_API_PORT: "46123"
      LOCAL_API_MODE: "docker"
      LOCAL_API_CLOUD_FALLBACK: "false"
      WS_RELAY_URL: "http://rig-wm-ais-relay:3004"
      LLM_API_URL: "${WM_LLM_API_URL:-}"
      LLM_API_KEY: "${WM_LLM_API_KEY:-}"
      LLM_MODEL: "${WM_LLM_MODEL:-}"
      GROQ_API_KEY: "${WM_GROQ_API_KEY:-}"
      AISSTREAM_API_KEY: "${AISSTREAM_API_KEY:-}"
      FINNHUB_API_KEY: "${FINNHUB_API_KEY:-}"
      EIA_API_KEY: "${EIA_API_KEY:-}"
      FRED_API_KEY: "${FRED_API_KEY:-}"
      ACLED_ACCESS_TOKEN: "${ACLED_ACCESS_TOKEN:-}"
      NASA_FIRMS_API_KEY: "${NASA_FIRMS_API_KEY:-}"
      CLOUDFLARE_API_TOKEN: "${CLOUDFLARE_API_TOKEN:-}"
      AVIATIONSTACK_API: "${AVIATIONSTACK_API:-}"
    ports:
      - "3001:8080"
    networks:
      - rig-network
    depends_on:
      rig-wm-redis-rest:
        condition: service_started
      rig-wm-ais-relay:
        condition: service_started
    restart: unless-stopped

  rig-wm-ais-relay:
    build:
      context: ../world-monitor
      dockerfile: Dockerfile.relay
    image: rig-worldmonitor-ais-relay:latest
    container_name: rig-wm-ais-relay
    environment:
      AISSTREAM_API_KEY: "${AISSTREAM_API_KEY:-}"
      PORT: "3004"
    networks:
      - rig-network
    restart: unless-stopped

  rig-wm-redis:
    image: docker.io/redis:7-alpine
    container_name: rig-wm-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - rig-wm-redis-data:/data
    networks:
      - rig-network
    restart: unless-stopped

  rig-wm-redis-rest:
    build:
      context: ../world-monitor/docker
      dockerfile: Dockerfile.redis-rest
    image: rig-worldmonitor-redis-rest:latest
    container_name: rig-wm-redis-rest
    environment:
      SRH_TOKEN: "${WM_REDIS_TOKEN:-wm-local-token}"
      SRH_CONNECTION_STRING: "redis://rig-wm-redis:6379"
    networks:
      - rig-network
    depends_on:
      - rig-wm-redis
    restart: unless-stopped

networks:
  rig-network:
    driver: bridge
    # IPv6 enabled (Docker Desktop's "Enable IPv6" toggle is on); harmless
    # for everything else. Originally added in a (failed) attempt to reach
    # 7 govt domains (finmin.nic.in, tserc.gov.in, tspsc.gov.in,
    # loksabhadocs.nic.in, eparlib.nic.in, plus Sansad mirrors). Investigation
    # showed those domains return ANCOUNT=0 from any public resolver — they
    # are genuinely NXDOMAIN, not IPv6-only. The fix is URL re-research,
    # not network surgery.
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.30.0.0/24
        - subnet: fd00:dead:beef::/64

volumes:
  rig-postgres-data:
    name: rig-postgres-data
  rig-freshrss-data:
    name: rig-freshrss-data
  rig-wm-redis-data:
    name: rig-wm-redis-data
